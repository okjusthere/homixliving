name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: homixliving
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d homixliving"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Build-time stand-ins only — no real services are contacted in CI.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/homixliving
      AUTH_SECRET: ci-only-secret-not-used-in-prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Seed schema into throwaway Postgres
        # Doubles as a smoke test that db:seed creates every table the app
        # expects (the schema-drift class of bug).
        run: npm run db:seed

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
