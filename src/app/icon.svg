<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cream paper background, rounded corners. Matches site theme tone.paper. -->
  <rect width="64" height="64" rx="12" fill="#F7F4EE"/>
  <!--
    Roof + chimney silhouette, filled. The shape mirrors the small house mark
    that sits above the "M" in the Homix wordmark. Designed to read clearly
    at 16x16 (browser tab favicon) all the way up to 180x180 (iOS home screen).
    Color: warm walnut brown matching the wordmark.
  -->
  <path d="M 8 48 L 32 16 L 44 30 L 44 22 L 52 22 L 52 38 L 56 48 Z" fill="#8B5A3C"/>
</svg>
